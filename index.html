<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Salus System Master</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f8; min-height: 100vh; }
    .screen { display: none !important; }
    .screen.active { display: block !important; }
    #login-screen.active { display: flex !important; }

    #login-screen {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a237e 0%, #283593 55%, #1565c0 100%);
      align-items: center; justify-content: center;
    }
    .login-box {
      background: #fff; border-radius: 16px;
      padding: 3rem 2.4rem; width: 370px; text-align: center;
      box-shadow: 0 16px 48px rgba(0,0,0,0.25);
    }
    .login-logo-img { margin-bottom: 0.5rem; }
    .login-logo-old {
      display: none;
    }
    .login-box h2 { font-size: 22px; color: #1a237e; margin-bottom: 3px; font-weight: 700; }
    .login-box .sub { font-size: 13px; color: #999; margin-bottom: 1.8rem; }
    .login-box input {
      width: 100%; padding: 12px 15px; border: 1.5px solid #ddd;
      border-radius: 9px; font-size: 14px; margin-bottom: 13px; outline: none;
      transition: border 0.2s; color: #333;
    }
    .login-box input:focus { border-color: #1a237e; }
    .btn-login {
      width: 100%; padding: 13px; background: #1a237e; color: #fff;
      border: none; border-radius: 9px; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: background 0.2s;
    }
    .btn-login:hover { background: #283593; }
    .err { color: #c62828; font-size: 12px; margin-bottom: 10px; display: none; }

      background-repeat: no-repeat;
      background-position: center center;
      background-size: auto 70%;
      position: relative;
    }
    .topbar::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(26, 35, 126, 0.82);
      z-index: 0;
    }
    .topbar > * {
      position: relative;
      z-index: 1;
    }
    .topbar-left { display: flex; align-items: center; gap: 14px; }
    .topbar-logo {
      width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 800;
    }
    .topbar-title { font-size: 17px; font-weight: 700; }
    .topbar-sub { font-size: 11px; opacity: 0.75; margin-top: 1px; }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .topbar-user { font-size: 13px; opacity: 0.85; }
    .logout-btn {
      background: rgba(255,255,255,0.15); border: none; color: #fff;
      padding: 7px 16px; border-radius: 7px; cursor: pointer; font-size: 13px; font-weight: 600;
    }
    .logout-btn:hover { background: rgba(255,255,255,0.3); }

    #dept-screen, #links-screen { min-height: 100vh; }
    .content { padding: 1.8rem 1.6rem; max-width: 1200px; margin: 0 auto; }

    .page-title {
      font-size: 14px; font-weight: 700; color: #1a237e;
      text-transform: uppercase; letter-spacing: 0.8px;
      margin-bottom: 1.2rem; display: flex; align-items: center; gap: 8px;
    }
    .page-title::before {
      content: ''; display: inline-block; width: 4px; height: 18px;
      background: #1a237e; border-radius: 2px;
    }

    /* LOADING */
    .loading-box {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 3rem; gap: 16px;
    }
    .spinner {
      width: 40px; height: 40px; border: 4px solid #e0e4f5;
      border-top-color: #1a237e; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 14px; color: #666; }
    .refresh-btn {
      background: #1a237e; color: #fff; border: none; padding: 8px 20px;
      border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600;
      display: flex; align-items: center; gap: 6px;
    }
    .refresh-btn:hover { background: #283593; }
    .last-updated { font-size: 11px; color: #aaa; }

    /* DEPT GRID */
    .dept-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 14px;
    }
    .dept-card {
      background: #fff; border: 1.5px solid #e0e4f5; border-radius: 12px;
      padding: 1.3rem 1rem; text-align: center; cursor: pointer; transition: all 0.18s;
    }
    .dept-card:hover {
      border-color: #1a237e; background: #eef0fc;
      transform: translateY(-4px); box-shadow: 0 6px 18px rgba(26,35,126,0.13);
    }
    .dept-icon { width: 64px; height: 64px; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; }
    .dept-icon svg { width: 64px; height: 64px; filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.22)); }
    .dept-name { font-size: 13px; font-weight: 700; color: #1a237e; }
    .dept-count { font-size: 11px; color: #888; margin-top: 4px; }

    /* LINKS TABLE */
    .back-btn {
      background: none; border: 1.5px solid #1a237e; color: #1a237e;
      padding: 7px 18px; border-radius: 7px; cursor: pointer; font-size: 13px;
      font-weight: 600; margin-bottom: 1.2rem;
    }
    .back-btn:hover { background: #eef0fc; }
    .dept-heading { font-size: 20px; font-weight: 800; color: #1a237e; margin-bottom: 1.3rem; }
    .table-wrap { overflow-x: auto; border-radius: 12px; box-shadow: 0 2px 12px rgba(26,35,126,0.09); }
    .links-table { width: 100%; border-collapse: collapse; background: #fff; min-width: 750px; }
    .links-table thead tr { background: #1a237e; color: #fff; }
    .links-table th { padding: 12px 14px; font-size: 12px; text-align: left; font-weight: 600; white-space: nowrap; }
    .links-table td { padding: 10px 14px; font-size: 12px; border-bottom: 1px solid #eef0f8; color: #333; vertical-align: top; }
    .links-table tr:last-child td { border-bottom: none; }
    .links-table tbody tr:hover td { background: #f3f5fc; }
    .process-name { font-weight: 700; color: #1a237e; font-size: 12px; }

    .chips { display: flex; flex-wrap: wrap; gap: 4px; }
    .chip {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 4px 10px; border-radius: 20px; font-size: 11px;
      font-weight: 600; white-space: nowrap; text-decoration: none; border: none; cursor: pointer;
      transition: all 0.15s; line-height: 1.5;
    }
    .chip-sheet  { background: #e3f2fd; color: #0d47a1; }
    .chip-sheet:hover  { background: #0d47a1; color: #fff; }
    .chip-form   { background: #e8f5e9; color: #1b5e20; }
    .chip-form:hover   { background: #1b5e20; color: #fff; }
    .chip-mis    { background: #fff3e0; color: #bf360c; }
    .chip-mis:hover    { background: #bf360c; color: #fff; }
    .chip-video  { background: #fce4ec; color: #880e4f; }
    .chip-video:hover  { background: #880e4f; color: #fff; }
    .chip-na     { background: #f5f5f5; color: #bbb; font-style: italic; font-weight: 400; cursor: default; }
    .chip-pending { background: #fff8e1; color: #f57f17; cursor: default; }

    .dept-icons { 'Assistant':'🧑‍💼','HR':'👥','MDO':'📊','PPIC':'📦','Admin':'🏢','Purchase':'🛒','Accounts':'💰','Store':'🏬','Engineering':'⚙️','QA':'✅','Micro':'🔬','QC':'🧪','SECURITY':'🔐','PRODUCTTION':'🏭','AI Tools':'🤖' }
  </style>

let sheetData = {};
let currentUser = null;
let currentDept = null;

// ============================================================
// CSV PARSER
// ============================================================
function parseCSV(text) {
  const rows = [];
  const lines = text.split('\n');
  for (let line of lines) {
    if (!line.trim()) continue;
    const cols = [];
    let inQ = false, cur = '';
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else { cur += c; }
    }
    cols.push(cur.trim());
    rows.push(cols);
  }
  return rows;
}

// ============================================================
// LOAD SHEET DATA
// ============================================================
async function fetchCSV(url) {
  const proxies = [
    url + '&t=' + Date.now(),
    'https://corsproxy.io/?' + encodeURIComponent(url),
    'https://api.allorigins.win/raw?url=' + encodeURIComponent(url),
  ];
  for (let u of proxies) {
    try {
      const r = await fetch(u, {cache:'no-store'});
      if (r.ok) { const t = await r.text(); if (t && t.length > 50) return t; }
    } catch(e) {}
  }
  return null;
}

async function loadSheet() {
  const grid = document.getElementById('dept-grid');
  grid.innerHTML = `<div class="loading-box" style="grid-column:1/-1">
    <div class="spinner"></div>
    <div class="loading-text">Loading data from Google Sheet...</div>
  </div>`;

  // Fetch both sheets simultaneously
  const [textNames, textURLs] = await Promise.all([
    fetchCSV(CSV_NAMES),
    fetchCSV(CSV_URLS)
  ]);

  if (!textNames || !textURLs) {
    grid.innerHTML = `<div class="loading-box" style="grid-column:1/-1">
      <div style="color:#c62828;font-size:14px;font-weight:600;">⚠️ Failed to load sheet</div>
      <div style="font-size:12px;color:#888;margin-top:4px;">This dashboard must be opened from <strong>GitHub Pages</strong>, not a local file.</div>
      <button class="refresh-btn" style="margin-top:12px" onclick="loadSheet()">&#x21bb; Try Again</button>
    </div>`;
    return;
  }

  const rowsNames = parseCSV(textNames); // System Master — actual names
  const rowsURLs  = parseCSV(textURLs);  // URL_EXPORT — actual URLs

  sheetData = {};
  let currentDeptName = '';

  for (let i = 1; i < rowsNames.length; i++) {
    const rN = rowsNames[i];       // name row
    const rU = rowsURLs[i] || [];  // url row

    if (!rN || rN.length < 4) continue;
    const deptCell = rN[COL.dept] ? rN[COL.dept].trim().toUpperCase() : '';
    if (deptCell) currentDeptName = deptCell;
    if (!currentDeptName) continue;
    if (!sheetData[currentDeptName]) sheetData[currentDeptName] = [];

    // Merge: for each cell, use URL from URL_EXPORT but NAME from System Master
    const merged = rN.map((nameVal, j) => {
      const urlVal = (rU[j] || '').trim();
      const isURL = urlVal.startsWith('http://') || urlVal.startsWith('https://');
      if (isURL) {
        // Store as encoded object so chip knows both name and URL
        return '\x00' + urlVal + '\x01' + (nameVal || '').trim();
      }
      return (nameVal || '').trim();
    });

    sheetData[currentDeptName].push(merged);
  }

  buildDepts();
  document.getElementById('last-updated').textContent =
    'Last updated: ' + new Date().toLocaleTimeString('en-IN');
}

// ============================================================
// BUILD DEPARTMENTS
// ============================================================
function buildDepts() {
  const grid = document.getElementById('dept-grid');
  grid.innerHTML = '';
  Object.entries(sheetData).forEach(([dept, rows]) => {
    const icon = ICONS[dept] || `<svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M6 14h16l4 5h20v23H6z" fill="#5c6bc0"/><path d="M6 19h40v23H6z" fill="#9fa8da"/></svg>`;
    const card = document.createElement('div');
    card.className = 'dept-card';
    card.innerHTML = `<div class="dept-icon">${icon}</div>
      <div class="dept-name">${dept}</div>
      <div class="dept-count">${rows.length} process${rows.length !== 1 ? 'es' : ''}</div>`;
    card.onclick = () => openDept(dept);
    grid.appendChild(card);
  });
}

// ============================================================
// CHIP RENDERER
// ============================================================
// Extract a readable label from Google Sheets/Forms URL
function labelFromUrl(url, type, colName) {
  // If colName given use it as label
  if (colName && colName.trim() && colName.toUpperCase() !== 'NA') return colName.trim();
  if (url.includes('forms.gle') || url.includes('/forms/')) return 'Open Form';
  if (url.includes('youtu')) return 'Watch Video';
  if (url.includes('drive.google') && url.includes('/file/')) return 'Open File';
  if (url.includes('drive.google') && url.includes('/drive/')) return 'Open Drive';
  return 'Open Sheet';
}

function chip(val, type, labelOverride) {
  if (!val || val.trim() === '' || val.trim().toUpperCase() === 'NA') {
    return '<span class="chip chip-na">NA</span>';
  }
  if (val.trim().toLowerCase() === 'pending') {
    return '<span class="chip chip-pending">⏳ Pending</span>';
  }

  // Check if merged format (URL + name from dual fetch)
  let url = '', name = '';
  if (val.startsWith('\x00')) {
    const parts = val.slice(1).split('\x01');
    url  = parts[0] || '';
    name = parts[1] || '';
  } else if (val.startsWith('http://') || val.startsWith('https://')) {
    url  = val.trim();
    name = labelOverride || '';
  } else {
    // Plain text — show as label chip (no link)
    return `<span class="chip" style="background:#e8eaf6;color:#283593;cursor:default;font-weight:600">${val.trim()}</span>`;
  }

  if (!url) return '<span class="chip chip-na">NA</span>';

  // Determine chip style by URL type
  let cls, icon;
  if (type === 'forms' || url.includes('forms.gle') || url.includes('/forms/')) {
    cls = 'chip-form'; icon = '📋';
  } else if (type === 'mis') {
    cls = 'chip-mis'; icon = '📊';
  } else if (type === 'video' || url.includes('youtu')) {
    cls = 'chip-video'; icon = '▶';
  } else if (url.includes('drive.google') && url.includes('/file/')) {
    cls = 'chip-video'; icon = '📁';
  } else {
    cls = 'chip-sheet'; icon = '🔗';
  }

  const displayLabel = name || labelOverride || 'Open';
  return `<a class="chip ${cls}" href="${url}" target="_blank" rel="noopener">${icon} ${displayLabel}</a>`;
}

function multiChip(val, type, labelOverride) {
  if (!val || (typeof val === 'string' && val.trim() === '')) return '<span class="chip chip-na">NA</span>';
  return chip(val, type, labelOverride);
}

// ============================================================
// OPEN DEPARTMENT
// ============================================================
function openDept(dept) {
  currentDept = dept;
  const rows = sheetData[dept] || [];
  const icon = ICONS[dept] || '';
  document.getElementById('dept-heading').innerHTML = `<span style="display:inline-flex;align-items:center;gap:12px;vertical-align:middle">${icon}&nbsp;${dept}</span>`;
  document.getElementById('topbar-dept-name').textContent = dept + ' Department';

  const tbody = document.getElementById('links-tbody');

  // Smart label — extract name from merged cell or use plain text
  function smartLabel(val) {
    if (!val || val.trim() === '' || val.trim().toUpperCase() === 'NA') return null;
    if (val.startsWith('\x00')) {
      const parts = val.slice(1).split('\x01');
      return parts[1] || null; // return name part
    }
    if (val.startsWith('http://') || val.startsWith('https://')) return null;
    return val.trim(); // plain text is already the name
  }

  tbody.innerHTML = rows.map((r, i) => {
    const proc = (r[COL.process] || '').trim();
    return `<tr>
    <td style="color:#bbb;font-size:11px">${i + 1}</td>
    <td><div class="process-name">${proc}</div></td>
    <td style="font-size:12px;font-weight:600">${r[COL.incharge] || ''}</td>
    <td style="font-size:12px;color:#666">${r[COL.exec] || ''}</td>
    <td><div class="chips">${multiChip(r[COL.fms],      'fms',   smartLabel(r[COL.fms]))}</div></td>
    <td><div class="chips">${multiChip(r[COL.ims],      'ims',   smartLabel(r[COL.ims]))}</div></td>
    <td><div class="chips">
      ${multiChip(r[COL.checklist], 'sheet', smartLabel(r[COL.checklist]))}
      ${r[COL.sheets] && r[COL.sheets].trim() && r[COL.sheets].trim().toUpperCase() !== 'NA' && r[COL.sheets].trim() !== r[COL.checklist].trim()
        ? multiChip(r[COL.sheets], 'sheet', smartLabel(r[COL.sheets]))
        : ''}
    </div></td>
    <td><div class="chips">${multiChip(r[COL.forms],    'forms', smartLabel(r[COL.forms]))}</div></td>
    <td><div class="chips">${multiChip(r[COL.mis],      'mis',   smartLabel(r[COL.mis]))}</div></td>
    <td><div class="chips">${multiChip(r[COL.video],    'video', smartLabel(r[COL.video]))}</div></td>
  </tr>`;
  }).join('');

  show('links-screen');
}

// ============================================================
// AUTH
// ============================================================
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function doLogin() {
  const u = document.getElementById('uname').value.trim();
  const p = document.getElementById('upass').value.trim();
  const user = USERS.find(x => x.username.toLowerCase() === u.toLowerCase() && x.password === p);
  if (!user) { document.getElementById('err-msg').style.display = 'block'; return; }
  document.getElementById('err-msg').style.display = 'none';
  currentUser = user;
  const w = 'Welcome, ' + user.name;
  document.getElementById('topbar-user').textContent = w;
  document.getElementById('topbar-user2').textContent = w;
  show('dept-screen');
  loadSheet();
}
['uname','upass'].forEach(id =>
  document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); })
);

function doLogout() {
  currentUser = null;
  document.getElementById('uname').value = '';
  document.getElementById('upass').value = '';
  show('login-screen');
}

function goBack() { show('dept-screen'); }
</script>
</body>
</html>
